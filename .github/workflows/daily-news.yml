# Runs every day at 7:00 AM UTC (12:30 PM IST).
# Pulls live RSS feeds, rewrites each article with OpenAI,
# attaches an Unsplash photo, and publishes to Supabase.
#
# ─── GitHub Secrets required ────────────────────────────────────────────────
#   SUPABASE_URL           https://shxnkkhsuuotnfewdvnt.supabase.co
#   SUPABASE_SERVICE_KEY   Project Settings → API → service_role key
#   OPENAI_API_KEY         platform.openai.com → API keys
#   UNSPLASH_ACCESS_KEY    unsplash.com/developers → New Application → Access Key
# ────────────────────────────────────────────────────────────────────────────

name: Daily News Bot

on:
  schedule:
    - cron: '0 7 * * *'   # 7:00 AM UTC = 12:30 PM IST every day
  workflow_dispatch:        # Also runnable manually from the Actions tab

jobs:
  post-daily-news:
    name: Fetch, rewrite, and publish news
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install bot dependencies
        run: npm install
        working-directory: scripts

      - name: Run Daily News Bot
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node daily-news-bot.mjs
